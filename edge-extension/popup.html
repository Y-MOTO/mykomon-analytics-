<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyKomon 日報入力補助</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Meiryo", "Yu Gothic", sans-serif;
      font-size: 13px;
      width: 320px;
      background: #f5f7fa;
      color: #333;
    }

    header {
      background: #1a56a0;
      color: white;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
    }

    .card {
      background: white;
      margin: 12px;
      border-radius: 6px;
      padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .card-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #1a56a0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .option-btn {
      padding: 6px 12px;
      border: 1.5px solid #ccc;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .option-btn:hover {
      border-color: #1a56a0;
      color: #1a56a0;
    }

    .option-btn.selected {
      background: #1a56a0;
      border-color: #1a56a0;
      color: white;
    }

    #card-blocking {
      display: none;
    }

    #insert-btn {
      display: block;
      width: calc(100% - 24px);
      margin: 0 12px 14px;
      padding: 11px;
      background: #1a56a0;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    #insert-btn:hover {
      background: #154a8a;
    }

    #insert-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #message {
      text-align: center;
      font-size: 12px;
      color: #e74c3c;
      margin: -6px 12px 10px;
      min-height: 16px;
    }

    #success-msg {
      text-align: center;
      font-size: 12px;
      color: #27ae60;
      margin: -6px 12px 10px;
      min-height: 16px;
    }
  </style>
</head>
<body>

<header>MyKomon 日報入力補助</header>

<!-- [1] 業務区分 -->
<div class="card">
  <div class="card-title">[1] 業務区分</div>
  <div class="options" id="options-category">
    <button class="option-btn" data-value="申告">申告</button>
    <button class="option-btn" data-value="相談">相談</button>
    <button class="option-btn" data-value="監査">監査</button>
    <button class="option-btn" data-value="記帳代行">記帳代行</button>
    <button class="option-btn" data-value="その他">その他</button>
  </div>
</div>

<!-- [2] 業務ステータス -->
<div class="card">
  <div class="card-title">[2] 業務ステータス</div>
  <div class="options" id="options-status">
    <button class="option-btn" data-value="完了">完了</button>
    <button class="option-btn" data-value="継続">継続</button>
    <button class="option-btn" data-value="中断">中断</button>
  </div>
</div>

<!-- [3] 阻害要因（「継続」「中断」選択時のみ表示） -->
<div class="card" id="card-blocking">
  <div class="card-title">[3] 阻害要因（複数選択可）</div>
  <div class="options" id="options-blocking">
    <button class="option-btn" data-value="資料待ち">資料待ち</button>
    <button class="option-btn" data-value="確認中">確認中</button>
    <button class="option-btn" data-value="知識不足">知識不足</button>
    <button class="option-btn" data-value="客先都合">客先都合</button>
    <button class="option-btn" data-value="その他">その他</button>
  </div>
</div>

<div id="message"></div>
<div id="success-msg"></div>

<button id="insert-btn">平文に反映する</button>

<script src="popup.js"></script>
</body>
</html>
